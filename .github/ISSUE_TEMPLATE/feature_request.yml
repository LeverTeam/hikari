name: Feature Request
description: Suggest an idea or enhancement for this project
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        **Please check if the feature has already been requested by searching open and closed issues.**
  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      description: What is the functionality you would like to see added?
    validations:
      required: true
  - type: textarea
    id: justification
    attributes:
      label: Why should it be added?
      description: Explain the use case and how this helps the general user base. Avoid highly niche or completely personal workflow requests.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Are there any alternative ways to easily accomplish this currently?
